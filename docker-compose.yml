# docker-compose compatible with Podman (use podman-compose or podman play kube)
version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  orchestrator:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-marketplace}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-marketplace}"
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  db_data:
